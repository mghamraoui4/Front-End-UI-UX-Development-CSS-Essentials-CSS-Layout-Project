<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Docplanner Clone</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <h1 class="logo">Docplanner</h1>
  <nav>
    <a href="#">About us</a>
    <a href="#">Career</a>
    <a href="#">Departments</a>
  </nav>
</header>

<section class="hero">
  <h2>Making the healthcare experience more human</h2>
</section>

<section class="cards">
  <div class="card green">
    <h3>For patients</h3>
    <p>Find a doctor, book a visit</p>
  </div>

  <div class="card blue">
    <h3>For doctors</h3>
    <p>Save time managing visits</p>
  </div>

  <div class="card dark">
    <h3>For clinics</h3>
    <p>Deliver better care experience</p>
  </div>
</section>

<section class="brands">
  <p>We are a global company</p>
  <div class="logos">
    <span>ZnanyLekarz</span>
    <span>Doctoralia</span>
    <span>MioDottore</span>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Docplanner Clone</p>
</footer>

</body>
</html>
